<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCOVER — TECHNO JAPAN</title>
<meta name="description" content="Explore Japan's underground techno and house scene. Events, artists, venues.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@200;300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080808;
  --text: #f0ede8;
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text); font-family: var(--font-body);
  overflow-x: hidden; cursor: none; opacity: 0; animation: bodyFadeIn 0.8s ease forwards;
}
@keyframes bodyFadeIn { to { opacity: 1; } }
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
a { color: inherit; text-decoration: none; }

/* CURSOR */
.cursor-dot, .cursor-ring { position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; z-index: 99999; mix-blend-mode: difference; }
.cursor-dot { width: 6px; height: 6px; background: var(--text); transform: translate(-50%, -50%); }
.cursor-ring { width: 36px; height: 36px; border: 1px solid var(--text); transform: translate(-50%, -50%); transition: transform 0.15s ease-out, width 0.3s ease, height 0.3s ease; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 28px 40px; mix-blend-mode: difference; }
nav .logo { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; }
nav .nav-links { display: flex; gap: 32px; }
nav .nav-links a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; transition: opacity 0.3s ease; }
nav .nav-links a:hover { opacity: 1; }

/* BACK */
.back-link { display: inline-flex; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.4; transition: opacity 0.3s ease; margin-bottom: 40px; }
.back-link:hover { opacity: 1; }
.back-link .arrow { width: 24px; height: 1px; background: var(--text); position: relative; }
.back-link .arrow::before { content: ''; position: absolute; left: 0; top: -3px; width: 7px; height: 7px; border-left: 1px solid var(--text); border-bottom: 1px solid var(--text); transform: rotate(45deg); }

/* HEADER */
.page-header { padding: 160px 40px 0; }
.page-title { font-family: var(--font-display); font-size: clamp(64px, 12vw, 180px); line-height: 0.9; text-transform: uppercase; opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.3s; }
.page-subtitle { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; opacity: 0; animation: fadeSlideUp 0.6s ease forwards; animation-delay: 0.5s; color: rgba(240,237,232,0.5); margin-top: 16px; }

/* ===================== SEARCH BAR ===================== */
.search-bar {
  padding: 40px 40px 0;
  opacity: 0; animation: fadeSlideUp 0.6s ease forwards; animation-delay: 0.6s;
}
.search-input-wrap {
  position: relative;
  max-width: 480px;
}
.search-input {
  width: 100%;
  background: transparent;
  border: 1px solid rgba(240,237,232,0.12);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 14px 16px 14px 40px;
  outline: none;
  transition: border-color 0.3s ease;
  border-radius: 0;
  -webkit-appearance: none;
}
.search-input:focus { border-color: rgba(240,237,232,0.4); }
.search-input::placeholder { color: rgba(240,237,232,0.25); }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 14px; opacity: 0.3; pointer-events: none;
}

/* ===================== TABS ===================== */
.tabs {
  display: flex;
  padding: 40px 40px 0;
  border-bottom: 1px solid rgba(240,237,232,0.08);
  gap: 0;
}
.tab {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 16px 32px;
  background: transparent;
  border: none;
  color: var(--text);
  cursor: none;
  opacity: 0.35;
  transition: opacity 0.3s ease;
  position: relative;
}
.tab:hover { opacity: 0.7; }
.tab.active { opacity: 1; }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 1px;
  background: var(--text);
}
.tab-count {
  font-size: 8px;
  opacity: 0.4;
  margin-left: 6px;
}

/* ===================== CONTENT PANELS ===================== */
.panel { display: none; padding: 40px 40px 120px; }
.panel.active { display: block; }

/* ===================== CITY FILTER ===================== */
.city-filters {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.city-btn {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 6px 16px;
  border: 1px solid rgba(240,237,232,0.1);
  background: transparent;
  color: var(--text);
  cursor: none;
  opacity: 0.4;
  transition: opacity 0.3s ease, border-color 0.3s ease, background 0.3s ease, color 0.3s ease;
}
.city-btn:hover { opacity: 0.7; border-color: rgba(240,237,232,0.25); }
.city-btn.active { background: var(--text); color: var(--bg); opacity: 1; border-color: var(--text); }

/* ===================== EVENTS PANEL ===================== */
.event-row {
  display: grid;
  grid-template-columns: 80px 1fr 120px auto;
  gap: 24px;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid rgba(240,237,232,0.05);
  transition: background 0.2s ease;
  position: relative;
}
.event-row::before {
  content: ''; position: absolute; inset: 0 -40px;
  background: rgba(240,237,232,0.02); opacity: 0; transition: opacity 0.2s ease;
}
.event-row:hover::before { opacity: 1; }
.event-row * { position: relative; z-index: 1; }

.ev-date { font-family: var(--font-display); font-size: 24px; }
.ev-name { font-family: var(--font-display); font-size: 22px; text-transform: uppercase; }
.ev-sub { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.35; margin-top: 2px; }
.ev-city { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.4; }
.ev-tag {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 14px; border: 1px solid rgba(240,237,232,0.12);
}
.ev-tag.past { opacity: 0.25; }

.ev-lineup {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
}
.ev-lineup a {
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
  opacity: 0.35; transition: opacity 0.2s ease;
}
.ev-lineup a:hover { opacity: 1; }
.ev-lineup a::before { content: '— '; opacity: 0.3; }

/* ===================== ARTISTS PANEL ===================== */
.artist-row {
  display: grid;
  grid-template-columns: 1fr 140px 160px auto;
  gap: 24px;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid rgba(240,237,232,0.05);
  transition: background 0.2s ease;
  position: relative;
}
.artist-row::before {
  content: ''; position: absolute; inset: 0 -40px;
  background: rgba(240,237,232,0.02); opacity: 0; transition: opacity 0.2s ease;
}
.artist-row:hover::before { opacity: 1; }
.artist-row * { position: relative; z-index: 1; }

.ar-name { font-family: var(--font-display); font-size: 28px; text-transform: uppercase; }
.ar-city { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.4; }
.ar-genre { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.3; }
.ar-events-count { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.3; }
.ar-link {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em;
  opacity: 0; transition: opacity 0.3s ease;
}
.artist-row:hover .ar-link { opacity: 0.5; }

/* ===================== VENUES PANEL ===================== */
.venue-row {
  display: grid;
  grid-template-columns: 1fr 120px 100px auto;
  gap: 24px;
  align-items: center;
  padding: 20px 0;
  border-bottom: 1px solid rgba(240,237,232,0.05);
  transition: background 0.2s ease;
  position: relative;
}
.venue-row::before {
  content: ''; position: absolute; inset: 0 -40px;
  background: rgba(240,237,232,0.02); opacity: 0; transition: opacity 0.2s ease;
}
.venue-row:hover::before { opacity: 1; }
.venue-row * { position: relative; z-index: 1; }

.vn-name { font-family: var(--font-display); font-size: 28px; text-transform: uppercase; }
.vn-area { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.35; margin-top: 2px; }
.vn-city { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.4; }
.vn-cap { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.3; }
.vn-genre { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.3; }
.vn-events-count { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.3; }

/* NO RESULTS */
.no-results {
  text-align: center; padding: 80px 0;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; opacity: 0.25; text-transform: uppercase;
}

/* RESULT COUNT */
.result-count {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em;
  opacity: 0.25; text-transform: uppercase; margin-bottom: 24px;
}

/* EMBEDDED MAP */
#venues-map-wrap {
  margin-bottom: 32px; border: 1px solid rgba(240,237,232,0.1);
  overflow: hidden; position: relative;
  animation: mapSlideIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes mapSlideIn { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
#venues-map { height: 400px; background: var(--bg); }
.leaflet-container { background: var(--bg) !important; }
.leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
.embed-map-pin {
  width: 9px; height: 9px; border-radius: 50%;
  background: #ff2d2d; border: 2px solid rgba(8,8,8,0.8);
  cursor: pointer; transition: all 0.2s ease;
}
.embed-map-pin:hover { width: 13px; height: 13px; border-color: var(--text); margin-left: -2px; margin-top: -2px; }
.embed-map-pin-bar {
  width: 8px; height: 8px; border-radius: 1px;
  background: #ff2d2d; border: 1.5px solid rgba(8,8,8,0.8);
  transform: rotate(45deg); cursor: pointer; transition: all 0.2s ease;
}
.embed-map-pin-bar:hover { width: 12px; height: 12px; border-color: var(--text); margin-left: -2px; margin-top: -2px; }
.embed-map-label {
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.1em;
  color: var(--text); text-transform: uppercase; white-space: nowrap;
  pointer-events: none;
  background: rgba(8,8,8,0.9); border: 1px solid rgba(240,237,232,0.15);
  border-radius: 0; padding: 4px 10px; box-shadow: none;
}
.embed-map-label::before { display: none; }
.city-btn.map-active { background: #ff2d2d; color: var(--bg); border-color: #ff2d2d; }
#map-filter-bar {
  display: flex; gap: 8px; padding: 12px 16px; flex-wrap: wrap;
  background: rgba(8,8,8,0.9); border-bottom: 1px solid rgba(240,237,232,0.06);
}
.map-pill {
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 4px 12px; border: 1px solid rgba(240,237,232,0.15); border-radius: 0;
  background: transparent; color: rgba(240,237,232,0.4); cursor: pointer;
  transition: all 0.2s ease;
}
.map-pill:hover { border-color: rgba(240,237,232,0.4); color: var(--text); }
.map-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* FOOTER */
footer { padding: 60px 40px 40px; border-top: 1px solid rgba(240,237,232,0.08); }
.footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; }
.footer-logo { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; }
.footer-links { display: flex; gap: 32px; }
.footer-links a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; transition: opacity 0.3s ease; }
.footer-links a:hover { opacity: 1; }
.footer-copy { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.3; }

/* RESPONSIVE */
@media (max-width: 900px) {
  nav { padding: 20px 24px; }
  .page-header { padding: 140px 24px 0; }
  .search-bar { padding: 32px 24px 0; }
  .tabs { padding: 32px 24px 0; overflow-x: auto; }
  .panel { padding: 32px 24px 80px; }
  .event-row { grid-template-columns: 60px 1fr auto; gap: 16px; }
  .ev-city { display: none; }
  .artist-row { grid-template-columns: 1fr auto; gap: 12px; }
  .ar-city, .ar-genre { display: none; }
  .venue-row { grid-template-columns: 1fr auto; gap: 12px; }
  .vn-cap, .vn-genre { display: none; }
  .footer-top { flex-direction: column; gap: 24px; text-align: center; }
}
@media (max-width: 600px) {
  nav .nav-links { gap: 16px; }
  nav .nav-links a { font-size: 9px; }
  .tab { padding: 12px 16px; font-size: 9px; }
  .footer-links { gap: 20px; }
}
@media (hover: none) and (pointer: coarse) {
  body { cursor: auto; }
  .cursor-dot, .cursor-ring { display: none; }
  .tab, .city-btn, .search-input { cursor: pointer; }
}
</style>
</head>
<body>

<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<nav>
  <a href="index.html" class="logo">TECHNO JAPAN</a>
  <div class="nav-links">
    <a href="index.html#about">ABOUT</a>
    <a href="events.html">EVENTS</a>
    <a href="artists.html">ARTISTS</a>
    <a href="venues.html">VENUE</a>
    <a href="index.html#contact">CONTACT</a>
  </div>
</nav>

<header class="page-header">
  <a href="index.html" class="back-link"><span class="arrow"></span> BACK TO HOME</a>
  <h1 class="page-title">DISCOVER</h1>
  <div class="page-subtitle">EXPLORE JAPAN'S UNDERGROUND SCENE</div>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <div class="search-input-wrap">
    <span class="search-icon">&#9906;</span>
    <input type="text" class="search-input" id="search" placeholder="Search events, artists, venues...">
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-tab="events">EVENTS<span class="tab-count" id="count-events"></span></button>
  <button class="tab" data-tab="artists">ARTISTS<span class="tab-count" id="count-artists"></span></button>
  <button class="tab" data-tab="venues">VENUES<span class="tab-count" id="count-venues"></span></button>
</div>

<!-- PANELS -->
<div class="panel active" id="panel-events">
  <div class="city-filters" id="event-city-filters"></div>
  <div class="result-count" id="events-result-count"></div>
  <div id="events-list"></div>
</div>

<div class="panel" id="panel-artists">
  <div class="city-filters" id="artist-city-filters"></div>
  <div class="result-count" id="artists-result-count"></div>
  <div id="artists-list"></div>
</div>

<div class="panel" id="panel-venues">
  <div class="city-filters" id="venue-city-filters"></div>
  <div class="result-count" id="venues-result-count"></div>
  <div id="venues-map-wrap" style="display:none">
    <div id="map-filter-bar"></div>
    <div id="venues-map"></div>
  </div>
  <div id="venues-list"></div>
</div>

<footer>
  <div class="footer-top">
    <div class="footer-logo">TECHNO JAPAN</div>
    <div class="footer-links">
      <a href="index.html#about">ABOUT</a>
      <a href="events.html">EVENTS</a>
      <a href="artists.html">ARTISTS</a>
      <a href="index.html#contact">CONTACT</a>
    </div>
    <div class="footer-copy">&copy; 2024 TECHNO JAPAN. ALL RIGHTS RESERVED.</div>
  </div>
</footer>

<script src="data.js?v=2"></script>
<script>
/* ========== HELPERS ========== */
const MONTHS_S = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function isUpcoming(s) { const t = new Date(); t.setHours(0,0,0,0); return parseDate(s) >= t; }
function getArtist(id) { return ARTISTS.find(a => a.id === id); }
function getVenueEvents(venueName) {
  return EVENTS.filter(e => e.venue === venueName).sort((a,b) => parseDate(a.date) - parseDate(b.date));
}
function getArtistEventCount(id) { return EVENTS.filter(e => e.lineup && e.lineup.includes(id)).length; }
function uniqueCities(arr) { return [...new Set(arr.map(x => x.city))].sort(); }

/* ========== STATE ========== */
let activeTab = 'events';
let searchQuery = '';
let cityFilter = { events: 'ALL', artists: 'ALL', venues: 'ALL' };

/* ========== TABS ========== */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + activeTab).classList.add('active');
  });
});

/* ========== SEARCH ========== */
const searchInput = document.getElementById('search');
let searchTimeout;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    searchQuery = searchInput.value.toLowerCase().trim();
    renderAll();
  }, 150);
});

/* ========== CITY FILTERS ========== */
function renderCityFilters(containerId, cities, tabKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = `<button class="city-btn ${cityFilter[tabKey]==='ALL'?'active':''}" data-city="ALL">ALL</button>` +
    cities.map(c => {
      let cls = cityFilter[tabKey]===c ? 'active' : '';
      if (tabKey === 'venues' && c === 'TOKYO' && tokyoMapVisible) cls += ' map-active';
      return `<button class="city-btn ${cls}" data-city="${c}">${c}</button>`;
    }).join('');
  container.querySelectorAll('.city-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (tabKey === 'venues' && btn.dataset.city === 'TOKYO') {
        toggleTokyoMap();
        return;
      }
      hideTokyoMap();
      cityFilter[tabKey] = btn.dataset.city;
      renderAll();
    });
  });
}

/* ========== RENDER EVENTS ========== */
function renderEvents() {
  let items = [...EVENTS].sort((a,b) => parseDate(a.date) - parseDate(b.date));
  if (cityFilter.events !== 'ALL') items = items.filter(e => e.city === cityFilter.events);
  if (searchQuery) items = items.filter(e =>
    e.name.toLowerCase().includes(searchQuery) ||
    e.venue.toLowerCase().includes(searchQuery) ||
    e.city.toLowerCase().includes(searchQuery) ||
    (e.desc && e.desc.toLowerCase().includes(searchQuery)) ||
    (e.lineup && e.lineup.some(id => { const a = getArtist(id); return a && a.name.toLowerCase().includes(searchQuery); }))
  );

  document.getElementById('count-events').textContent = items.length;
  document.getElementById('events-result-count').textContent = items.length + ' EVENTS';
  renderCityFilters('event-city-filters', uniqueCities(EVENTS), 'events');

  if (!items.length) { document.getElementById('events-list').innerHTML = '<div class="no-results">NO EVENTS FOUND</div>'; return; }

  document.getElementById('events-list').innerHTML = items.map(ev => {
    const d = parseDate(ev.date);
    const upcoming = isUpcoming(ev.date);
    const lineupHtml = ev.lineup && ev.lineup.length
      ? `<div class="ev-lineup">${ev.lineup.map(id => { const a = getArtist(id); return `<a href="artists.html#artist/${id}">${a ? a.name : id}</a>`; }).join('')}</div>`
      : '';
    return `
      <a href="events.html" class="event-row">
        <div class="ev-date">${MONTHS_S[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}</div>
        <div>
          <div class="ev-name">${ev.name}</div>
          <div class="ev-sub">${ev.venue}${ev.time ? ' · ' + ev.time : ''}</div>
          ${lineupHtml}
        </div>
        <div class="ev-city">${ev.city}</div>
        <div class="ev-tag ${upcoming ? '' : 'past'}">${upcoming ? 'UPCOMING' : 'PAST'}</div>
      </a>`;
  }).join('');
  bindCursorExpand();
}

/* ========== RENDER ARTISTS ========== */
function renderArtists() {
  let items = [...ARTISTS];
  if (cityFilter.artists !== 'ALL') items = items.filter(a => a.city === cityFilter.artists);
  if (searchQuery) items = items.filter(a =>
    a.name.toLowerCase().includes(searchQuery) ||
    a.city.toLowerCase().includes(searchQuery) ||
    a.genre.toLowerCase().includes(searchQuery)
  );

  document.getElementById('count-artists').textContent = items.length;
  document.getElementById('artists-result-count').textContent = items.length + ' ARTISTS';
  renderCityFilters('artist-city-filters', uniqueCities(ARTISTS), 'artists');

  if (!items.length) { document.getElementById('artists-list').innerHTML = '<div class="no-results">NO ARTISTS FOUND</div>'; return; }

  document.getElementById('artists-list').innerHTML = items.map(a => {
    const evCount = getArtistEventCount(a.id);
    return `
      <a href="artists.html#artist/${a.id}" class="artist-row">
        <div class="ar-name">${a.name}</div>
        <div class="ar-city">${a.city}</div>
        <div class="ar-genre">${a.genre}</div>
        <div class="ar-events-count">${evCount} EVENT${evCount !== 1 ? 'S' : ''}</div>
      </a>`;
  }).join('');
  bindCursorExpand();
}

/* ========== RENDER VENUES ========== */
function renderVenues() {
  let items = [...VENUES];
  if (cityFilter.venues !== 'ALL') items = items.filter(v => v.city === cityFilter.venues);
  if (searchQuery) items = items.filter(v =>
    v.name.toLowerCase().includes(searchQuery) ||
    v.city.toLowerCase().includes(searchQuery) ||
    (v.area && v.area.toLowerCase().includes(searchQuery)) ||
    (Array.isArray(v.genre) ? v.genre.join(' ') : v.genre).toLowerCase().includes(searchQuery)
  );

  document.getElementById('count-venues').textContent = items.length;
  document.getElementById('venues-result-count').textContent = items.length + ' VENUES';
  renderCityFilters('venue-city-filters', uniqueCities(VENUES), 'venues');

  if (!items.length) { document.getElementById('venues-list').innerHTML = '<div class="no-results">NO VENUES FOUND</div>'; return; }

  document.getElementById('venues-list').innerHTML = items.map(v => {
    return `
      <a href="venues.html#venue/${v.id}" class="venue-row">
        <div>
          <div class="vn-name">${v.name}</div>
          <div class="vn-area">${v.area || ''}</div>
        </div>
        <div class="vn-city">${v.city}</div>
        <div class="vn-cap">${v.capacity ? '~' + v.capacity : '—'}</div>
        <div class="vn-genre">${Array.isArray(v.genre) ? v.genre.join(' / ') : v.genre}</div>
      </a>`;
  }).join('');
  bindCursorExpand();
}

/* ========== RENDER ALL ========== */
function renderAll() { renderEvents(); renderArtists(); renderVenues(); }

/* ========== CURSOR ========== */
const dot = document.querySelector('.cursor-dot');
const ring = document.querySelector('.cursor-ring');
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
});
function animateRing() {
  ringX += (mouseX - ringX) * 0.15; ringY += (mouseY - ringY) * 0.15;
  ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();
function bindCursorExpand() {
  document.querySelectorAll('a, .tab, .city-btn, .event-row, .artist-row, .venue-row').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width = '52px'; ring.style.height = '52px'; });
    el.addEventListener('mouseleave', () => { ring.style.width = '36px'; ring.style.height = '36px'; });
  });
}

/* ========== KEYBOARD NAV ========== */
document.addEventListener('keydown', (e) => {
  if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
  if (e.key === 'Escape') { searchInput.blur(); }
  if (e.key === '1') { document.querySelector('[data-tab="events"]').click(); }
  if (e.key === '2') { document.querySelector('[data-tab="artists"]').click(); }
  if (e.key === '3') { document.querySelector('[data-tab="venues"]').click(); }
});

/* ========== TOKYO MAP EMBED ========== */
let tokyoMapInstance = null;
let tokyoMapVisible = false;

const TOKYO_CLUBS = VENUES.filter(v => v.city === 'TOKYO' && v.lat);

let embedMapMarkers = [];
let embedGenreFilter = 'ALL';
let embedTypeFilter = null;

function initTokyoMap() {
  if (tokyoMapInstance) return;
  tokyoMapInstance = L.map('venues-map', {
    center: [35.6600, 139.6980],
    zoom: 13, minZoom: 11, maxZoom: 18,
    zoomControl: false, attributionControl: false
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19
  }).addTo(tokyoMapInstance);

  renderFilterBar();
  renderEmbedMarkers();
}

function renderFilterBar() {
  const bar = document.getElementById('map-filter-bar');
  const genres = ['ALL','TECHNO','HOUSE','EXPERIMENTAL','LIVE'];
  bar.innerHTML = genres.map(g =>
    `<button class="map-pill${embedGenreFilter===g?' active':''}" data-genre="${g}">${g}</button>`
  ).join('') +
  '<span style="width:1px;height:16px;background:rgba(240,237,232,0.08);margin:0 4px"></span>' +
  `<button class="map-pill${embedTypeFilter==='club'?' active':''}" data-type="club">CLUBS</button>` +
  `<button class="map-pill${embedTypeFilter==='bar'?' active':''}" data-type="bar">BARS</button>`;

  bar.querySelectorAll('.map-pill[data-genre]').forEach(p => {
    p.addEventListener('click', () => {
      embedGenreFilter = p.dataset.genre;
      renderFilterBar();
      renderEmbedMarkers();
    });
  });
  bar.querySelectorAll('.map-pill[data-type]').forEach(p => {
    p.addEventListener('click', () => {
      embedTypeFilter = embedTypeFilter === p.dataset.type ? null : p.dataset.type;
      renderFilterBar();
      renderEmbedMarkers();
    });
  });
}

function renderEmbedMarkers() {
  embedMapMarkers.forEach(m => tokyoMapInstance.removeLayer(m));
  embedMapMarkers = [];

  let filtered = TOKYO_CLUBS;
  if (embedGenreFilter !== 'ALL') {
    filtered = filtered.filter(c => c.genre.some(g => g.includes(embedGenreFilter)));
  }
  if (embedTypeFilter) {
    filtered = filtered.filter(c => c.type === embedTypeFilter);
  }

  filtered.forEach(c => {
    const pinClass = c.type === 'bar' ? 'embed-map-pin-bar' : 'embed-map-pin';
    const icon = L.divIcon({
      className: '',
      html: `<div class="${pinClass}"></div>`,
      iconSize: [9, 9], iconAnchor: [4.5, 4.5]
    });
    const m = L.marker([c.lat, c.lng], { icon }).addTo(tokyoMapInstance);
    m.bindTooltip(c.name, {
      className: 'embed-map-label',
      direction: 'right', offset: [8, 0], permanent: false
    });
    m.on('click', () => { window.location.href = 'venues.html#venue/' + c.id; });
    embedMapMarkers.push(m);
  });
}

function toggleTokyoMap() {
  const wrap = document.getElementById('venues-map-wrap');
  if (tokyoMapVisible) {
    wrap.style.display = 'none';
    tokyoMapVisible = false;
    cityFilter.venues = 'ALL';
    renderAll();
  } else {
    tokyoMapVisible = true;
    cityFilter.venues = 'TOKYO';
    renderAll();
    wrap.style.display = 'block';
    setTimeout(() => {
      initTokyoMap();
      tokyoMapInstance.invalidateSize();
    }, 50);
  }
}

function hideTokyoMap() {
  const wrap = document.getElementById('venues-map-wrap');
  if (tokyoMapVisible) {
    wrap.style.display = 'none';
    tokyoMapVisible = false;
    document.querySelectorAll('.city-btn.map-active').forEach(b => b.classList.remove('map-active'));
  }
}

/* ========== INIT ========== */
renderAll();

// Handle hash-based tab routing (e.g. media.html#venues)
(function() {
  const hash = window.location.hash.replace('#', '');
  if (['events', 'artists', 'venues'].includes(hash)) {
    const tabBtn = document.querySelector('[data-tab="' + hash + '"]');
    if (tabBtn) tabBtn.click();
  }
})();
</script>
</body>
</html>
