<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FESTIVALS — TECHNO JAPAN</title>
<meta name="description" content="Music festivals across Japan — techno, house, ambient, and beyond.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@200;300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080808;
  --text: #f0ede8;
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow-x: hidden;
  cursor: none;
  opacity: 0;
  animation: bodyFadeIn 0.8s ease forwards;
}

@keyframes bodyFadeIn { to { opacity: 1; } }
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
a { color: inherit; text-decoration: none; }

/* CURSOR */
.cursor-dot, .cursor-ring { position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; z-index: 99999; mix-blend-mode: difference; }
.cursor-dot { width: 6px; height: 6px; background: var(--text); transform: translate(-50%, -50%); }
.cursor-ring { width: 36px; height: 36px; border: 1px solid var(--text); transform: translate(-50%, -50%); transition: transform 0.15s ease-out, width 0.3s ease, height 0.3s ease; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 28px 40px; mix-blend-mode: difference; }
nav .logo { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; }
nav .nav-links { display: flex; gap: 32px; }
nav .nav-links a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; transition: opacity 0.3s ease; }
nav .nav-links a:hover { opacity: 1; }

/* BACK */
.back-link { display: inline-flex; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.4; transition: opacity 0.3s ease; margin-bottom: 40px; }
.back-link:hover { opacity: 1; }
.back-link .arrow { width: 24px; height: 1px; background: var(--text); position: relative; display: inline-block; }
.back-link .arrow::before { content: ''; position: absolute; left: 0; top: -3px; width: 7px; height: 7px; border-left: 1px solid var(--text); border-bottom: 1px solid var(--text); transform: rotate(45deg); }

/* PAGE HEADER */
.page-header { padding: 160px 40px 80px; border-bottom: 1px solid rgba(240,237,232,0.08); }
.page-header-inner { display: flex; justify-content: space-between; align-items: flex-end; }
.page-title { font-family: var(--font-display); font-size: clamp(64px, 12vw, 180px); line-height: 0.9; text-transform: uppercase; opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.3s; }
.page-subtitle { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; opacity: 0; animation: fadeSlideUp 0.6s ease forwards; animation-delay: 0.5s; color: rgba(240,237,232,0.5); padding-bottom: 12px; }

/* FESTIVALS GRID */
.festivals-section { padding: 60px 40px 120px; }
.festivals-grid { display: grid; grid-template-columns: 1fr; gap: 0; }

.festival-card {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0;
  border-bottom: 1px solid rgba(240,237,232,0.06);
  position: relative;
  overflow: hidden;
  transition: background 0.3s ease;
}
.festival-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(240,237,232,0.02);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.festival-card:hover::before { opacity: 1; }

.festival-image {
  position: relative;
  width: 360px;
  height: 240px;
  overflow: hidden;
  background: linear-gradient(135deg, rgba(120,80,200,0.3), rgba(200,60,100,0.3));
}
.festival-image img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.festival-card:hover .festival-image img { transform: scale(1.05); }
.festival-image-placeholder {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(120,80,200,0.3), rgba(200,60,100,0.2));
}

.festival-info {
  position: relative;
  z-index: 1;
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.festival-date-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0.5;
  margin-bottom: 12px;
}

.festival-name {
  font-family: var(--font-display);
  font-size: 42px;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 8px;
}

.festival-location {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.4;
  margin-bottom: 20px;
}

.festival-desc {
  font-family: var(--font-body);
  font-weight: 200;
  font-size: 13px;
  line-height: 1.8;
  opacity: 0.55;
  max-width: 480px;
  margin-bottom: 20px;
}

.festival-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.festival-tag {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.15em;
  padding: 4px 12px;
  border: 1px solid rgba(240,237,232,0.12);
  text-transform: uppercase;
  opacity: 0.6;
}

.festival-lineup {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.festival-lineup a {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.5;
  border-bottom: 1px solid rgba(240,237,232,0.15);
  padding-bottom: 2px;
  transition: opacity 0.3s ease;
}
.festival-lineup a:hover { opacity: 1; }

.festival-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.5;
  transition: opacity 0.3s ease;
  margin-top: auto;
}
.festival-link:hover { opacity: 1; }
.festival-link .link-arrow { width: 16px; height: 1px; background: var(--text); position: relative; display: inline-block; }
.festival-link .link-arrow::after { content: ''; position: absolute; right: 0; top: -3px; width: 7px; height: 7px; border-right: 1px solid var(--text); border-top: 1px solid var(--text); transform: rotate(45deg); }

/* SCROLL REVEAL */
.reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.7s ease, transform 0.7s ease; }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* FOOTER */
footer { border-top: 1px solid rgba(240,237,232,0.08); padding: 60px 40px; }
.footer-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 40px; }
.footer-logo { font-family: var(--font-display); font-size: 24px; text-transform: uppercase; }
.footer-links { display: flex; gap: 32px; }
.footer-links a { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.4; transition: opacity 0.3s ease; }
.footer-links a:hover { opacity: 1; }
.footer-copy { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.2; width: 100%; margin-top: 40px; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .festival-card { grid-template-columns: 1fr; }
  .festival-image { width: 100%; height: 200px; }
  .festival-info { padding: 28px 20px; }
  .festival-name { font-size: 32px; }
  nav { padding: 20px 24px; }
  nav .nav-links { gap: 16px; }
  nav .nav-links a { font-size: 8px; }
  .page-header { padding: 120px 24px 40px; }
  .festivals-section { padding: 40px 24px 80px; }
}

@media (hover: none) and (pointer: coarse) {
  body { cursor: auto; }
  .cursor-dot, .cursor-ring { display: none; }
}
</style>
</head>
<body>

<div class="cursor-dot"></div>
<div class="cursor-ring"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">TECHNO JAPAN</a>
  <div class="nav-links">
    <a href="index.html#about">ABOUT</a>
    <a href="media.html">DISCOVER</a>
    <a href="index.html#instagram">INSTAGRAM</a>
    <a href="index.html#contact">CONTACT</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<header class="page-header">
  <a href="index.html" class="back-link"><span class="arrow"></span> BACK TO HOME</a>
  <div class="page-header-inner">
    <h1 class="page-title">FESTIVALS</h1>
    <div class="page-subtitle">OUTDOOR · MULTI-DAY · OPEN-AIR</div>
  </div>
</header>

<!-- FESTIVALS -->
<main class="festivals-section">
  <div class="festivals-grid" id="festivals-grid"></div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-top">
    <div class="footer-logo">TECHNO JAPAN</div>
    <div class="footer-links">
      <a href="index.html#about">ABOUT</a>
      <a href="media.html">DISCOVER</a>
      <a href="index.html#instagram">INSTAGRAM</a>
      <a href="index.html#contact">CONTACT</a>
    </div>
    <div class="footer-copy">&copy; 2024 TECHNO JAPAN. ALL RIGHTS RESERVED.</div>
  </div>
</footer>

<script src="data.js?v=3"></script>
<script>

const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function formatFestDate(dateStr) {
  if (dateStr.includes('/')) {
    const [start, end] = dateStr.split('/');
    const [sy, sm, sd] = start.split('-').map(Number);
    const [ey, em, ed] = end.split('-').map(Number);
    return `${MONTHS[sm-1]} ${sd} — ${ed}, ${sy}`;
  }
  const [y, m, d] = dateStr.split('-').map(Number);
  return `${MONTHS[m-1]} ${d}, ${y}`;
}

function getArtist(id) {
  return ARTISTS.find(a => a.id === id);
}

function renderFestivals() {
  const grid = document.getElementById('festivals-grid');
  const sorted = [...FESTIVALS].sort((a, b) => {
    const da = a.date.split('/')[0];
    const db = b.date.split('/')[0];
    return new Date(da) - new Date(db);
  });

  grid.innerHTML = sorted.map((f, i) => {
    const imgHtml = f.image
      ? `<img src="${f.image}" alt="${f.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
      : '';
    const lineupHtml = f.lineup && f.lineup.length
      ? `<div class="festival-lineup">${f.lineup.map(id => {
          const a = getArtist(id);
          const name = a ? a.name : id.toUpperCase().replace(/-/g, ' ');
          return `<a href="artists.html#artist/${id}">${name}</a>`;
        }).join('')}</div>`
      : '';
    const linkHtml = f.url
      ? `<a href="${f.url}" target="_blank" rel="noopener" class="festival-link">OFFICIAL SITE <span class="link-arrow"></span></a>`
      : '';

    return `
      <div class="festival-card reveal" style="transition-delay:${i * 100}ms">
        <div class="festival-image">
          ${imgHtml}
          <div class="festival-image-placeholder" style="${f.image ? 'display:none' : ''}"></div>
        </div>
        <div class="festival-info">
          <div class="festival-date-badge">${formatFestDate(f.date)}</div>
          <div class="festival-name">${f.name}</div>
          <div class="festival-location">${f.location} — ${f.city}</div>
          <div class="festival-tags">${f.genre.map(g => `<span class="festival-tag">${g}</span>`).join('')}</div>
          <div class="festival-desc">${f.desc}</div>
          ${lineupHtml}
          ${linkHtml}
        </div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

/* SCROLL REVEAL */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });

/* CURSOR */
const dot = document.querySelector('.cursor-dot');
const ring = document.querySelector('.cursor-ring');
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
});
function animateRing() {
  ringX += (mouseX - ringX) * 0.15; ringY += (mouseY - ringY) * 0.15;
  ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();
document.querySelectorAll('a, .festival-card').forEach(el => {
  el.addEventListener('mouseenter', () => { ring.style.width = '52px'; ring.style.height = '52px'; });
  el.addEventListener('mouseleave', () => { ring.style.width = '36px'; ring.style.height = '36px'; });
});

/* INIT */
renderFestivals();
</script>
</body>
</html>
