<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTISTS — TECHNO JAPAN</title>
<meta name="description" content="Artists and DJs from Japan's underground techno and house music scene.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@200;300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080808;
  --text: #f0ede8;
  --font-display: 'Bebas Neue', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow-x: hidden;
  cursor: none;
  opacity: 0;
  animation: bodyFadeIn 0.8s ease forwards;
}

@keyframes bodyFadeIn { to { opacity: 1; } }
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

a { color: inherit; text-decoration: none; }

/* CURSOR */
.cursor-dot, .cursor-ring {
  position: fixed; top: 0; left: 0; border-radius: 50%;
  pointer-events: none; z-index: 99999; mix-blend-mode: difference;
}
.cursor-dot { width: 6px; height: 6px; background: var(--text); transform: translate(-50%, -50%); }
.cursor-ring {
  width: 36px; height: 36px; border: 1px solid var(--text);
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease-out, width 0.3s ease, height 0.3s ease;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; justify-content: space-between; align-items: center;
  padding: 28px 40px; mix-blend-mode: difference;
}
nav .logo { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; }
nav .nav-links { display: flex; gap: 32px; }
nav .nav-links a {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; opacity: 0.6; transition: opacity 0.3s ease;
}
nav .nav-links a:hover { opacity: 1; }
nav .nav-links .nav-dropdown { position: relative; display: flex; align-items: center; }
nav .nav-links .nav-dropdown > a { cursor: pointer; }
nav .nav-dropdown-menu { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); padding-top: 12px; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
nav .nav-dropdown:hover .nav-dropdown-menu { opacity: 1; pointer-events: auto; }
nav .nav-dropdown-menu-inner { background: rgba(8,8,8,0.95); border: 1px solid rgba(240,237,232,0.1); backdrop-filter: blur(12px); padding: 12px 0; min-width: 160px; display: flex; flex-direction: column; }
nav .nav-dropdown-menu-inner a { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; padding: 10px 24px; opacity: 0.5; transition: opacity 0.2s ease, background 0.2s ease; white-space: nowrap; }
nav .nav-dropdown-menu-inner a:hover { opacity: 1; background: rgba(240,237,232,0.05); }

/* BACK LINK */
.back-link {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; opacity: 0.4; transition: opacity 0.3s ease; margin-bottom: 40px;
}
.back-link:hover { opacity: 1; }
.back-link .arrow {
  width: 24px; height: 1px; background: var(--text); position: relative;
}
.back-link .arrow::before {
  content: ''; position: absolute; left: 0; top: -3px;
  width: 7px; height: 7px;
  border-left: 1px solid var(--text); border-bottom: 1px solid var(--text);
  transform: rotate(45deg);
}

/* PAGE HEADER */
.page-header { padding: 160px 40px 80px; border-bottom: 1px solid rgba(240,237,232,0.08); }
.page-header-inner { display: flex; justify-content: space-between; align-items: flex-end; }
.page-title {
  font-family: var(--font-display); font-size: clamp(64px, 12vw, 180px);
  line-height: 0.9; text-transform: uppercase;
  opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; animation-delay: 0.3s;
}
.page-subtitle {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em;
  opacity: 0; animation: fadeSlideUp 0.6s ease forwards; animation-delay: 0.5s;
  color: rgba(240,237,232,0.5); padding-bottom: 12px;
}

/* ===================== SEARCH & FILTER ===================== */
.artists-toolbar {
  padding: 40px 40px 0;
  display: flex; flex-direction: column; gap: 24px;
}

.artists-search-row {
  display: flex; align-items: center; gap: 16px;
}

.artists-search {
  flex: 1; max-width: 400px;
  background: transparent;
  border: 1px solid rgba(240,237,232,0.12);
  color: var(--text);
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
  padding: 12px 20px;
  outline: none;
  transition: border-color 0.3s ease;
}
.artists-search::placeholder { color: rgba(240,237,232,0.25); }
.artists-search:focus { border-color: rgba(240,237,232,0.35); }

.artists-sort {
  background: transparent;
  border: 1px solid rgba(240,237,232,0.12);
  color: var(--text);
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
  padding: 12px 16px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.3s ease;
  -webkit-appearance: none;
  appearance: none;
}
.artists-sort option { background: #080808; color: var(--text); }

.artists-count {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
  opacity: 0.3; margin-left: auto;
}

.artists-genre-nav {
  display: flex; gap: 0; flex-wrap: wrap;
  border-bottom: 1px solid rgba(240,237,232,0.08);
}

.genre-tab {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 10px 20px;
  background: none; border: none; color: var(--text);
  opacity: 0.3; cursor: pointer;
  transition: opacity 0.3s ease;
  position: relative;
  white-space: nowrap;
}
.genre-tab:hover { opacity: 0.7; }
.genre-tab.active { opacity: 1; }
.genre-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 1px; background: var(--text);
}

/* ===================== ARTISTS LIST VIEW ===================== */
#artists-list-view { padding: 0 0 120px; }

.artists-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 40px;
}

.artist-card {
  aspect-ratio: 3/4;
  position: relative;
  overflow: hidden;
  display: block;
  cursor: none;
}
.artist-card-img {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.artist-card:hover .artist-card-img { transform: scale(1.08); }

/* Bottom gradient always visible */
.artist-card::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
  z-index: 1;
  pointer-events: none;
}

/* Hover overlay */
.artist-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.artist-card:hover::after { opacity: 1; }

.artist-card-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px;
  z-index: 2;
  display: flex;
  flex-direction: column;
}

.artist-card-genre {
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.25em;
  text-transform: uppercase; opacity: 0.5; margin-bottom: 6px;
}
.artist-card-name {
  font-family: var(--font-display); font-size: clamp(20px, 2vw, 32px);
  text-transform: uppercase; line-height: 1; margin-bottom: 4px;
}
.artist-card-city {
  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.2em;
  text-transform: uppercase; opacity: 0.4;
}

/* No results */
.artists-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em;
  opacity: 0.3;
  text-transform: uppercase;
}

/* ===================== ARTIST DETAIL VIEW ===================== */
#artist-detail-view { display: none; }

.artist-back {
  display: inline-flex; align-items: center; gap: 12px; padding: 60px 40px 0;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; opacity: 0.4; transition: opacity 0.3s ease;
  cursor: none;
}
.artist-back:hover { opacity: 1; }

.artist-detail { padding: 40px 40px 120px; }

.artist-detail-header {
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
  padding-bottom: 60px; border-bottom: 1px solid rgba(240,237,232,0.08);
}

.artist-detail-name {
  font-family: var(--font-display); font-size: clamp(56px, 8vw, 120px);
  line-height: 0.9; text-transform: uppercase;
}
.artist-detail-meta { display: flex; flex-direction: column; justify-content: flex-end; gap: 24px; }
.artist-detail-tags { display: flex; gap: 12px; flex-wrap: wrap; }
.artist-detail-tags span {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 6px 16px;
  border: 1px solid rgba(240,237,232,0.15);
}
.artist-detail-bio {
  font-family: var(--font-body); font-weight: 200; font-size: 15px;
  line-height: 1.9; opacity: 0.7; max-width: 600px;
}
.artist-detail-links { display: flex; gap: 24px; margin-top: 8px; }
.artist-detail-links a {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; opacity: 0.4; transition: opacity 0.3s ease;
  padding-bottom: 2px; border-bottom: 1px solid rgba(240,237,232,0.15);
}
.artist-detail-links a:hover { opacity: 1; }

/* ARTIST EVENTS */
.artist-events { padding-top: 60px; }
.artist-events-title {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; opacity: 0.4; margin-bottom: 32px;
  display: flex; align-items: center; gap: 20px;
}
.artist-events-title::after {
  content: ''; flex: 1; height: 1px; background: rgba(240,237,232,0.1);
}

.artist-event-row {
  display: grid; grid-template-columns: 80px 1fr auto; gap: 32px;
  padding: 24px 0; border-bottom: 1px solid rgba(240,237,232,0.06);
  align-items: center; transition: background 0.3s ease;
  position: relative;
}
.artist-event-row::before {
  content: ''; position: absolute; inset: 0 -40px;
  background: rgba(240,237,232,0.02); opacity: 0; transition: opacity 0.3s ease;
}
.artist-event-row:hover::before { opacity: 1; }

.artist-event-date {
  font-family: var(--font-display); font-size: 28px; position: relative; z-index: 1;
}
.artist-event-info { position: relative; z-index: 1; }
.artist-event-name {
  font-family: var(--font-display); font-size: 24px; text-transform: uppercase;
  margin-bottom: 4px;
}
.artist-event-venue {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em;
  opacity: 0.4; text-transform: uppercase;
}
.artist-event-tag {
  position: relative; z-index: 1;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 6px 16px;
  border: 1px solid rgba(240,237,232,0.15);
}
.artist-event-tag.past { opacity: 0.3; }

/* REVEAL */
.reveal {
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* FOOTER */
footer { padding: 60px 40px 40px; border-top: 1px solid rgba(240,237,232,0.08); }
.footer-top {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px;
}
.footer-logo { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; }
.footer-links { display: flex; gap: 32px; }
.footer-links a {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; opacity: 0.5; transition: opacity 0.3s ease;
}
.footer-links a:hover { opacity: 1; }
.footer-copy { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; opacity: 0.3; }

/* HAMBURGER */
.nav-hamburger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  padding: 4px; z-index: 10001; background: none; border: none;
  position: fixed; top: 28px; right: 48px;
}
.nav-hamburger span { display: block; width: 22px; height: 2px; background: var(--text); transition: transform 0.3s ease, opacity 0.3s ease; }
.nav-hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 5px); }
.nav-hamburger.active span:nth-child(2) { opacity: 0; }
.nav-hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -5px); }
.nav-overlay {
  display: none; position: fixed; inset: 0; background: #080808;
  z-index: 10000; flex-direction: column; align-items: center; justify-content: center; gap: 32px;
}
.nav-overlay.active { display: flex; }
.nav-overlay a { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; transition: opacity 0.3s ease; }
.nav-overlay a:hover { opacity: 1; }
.nav-overlay .nav-overlay-sub { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: -8px; }
.nav-overlay .nav-overlay-sub a { font-size: 10px; opacity: 0.35; }
.nav-overlay .nav-back { position: absolute; bottom: 48px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; opacity: 0.45; transition: opacity 0.3s ease; cursor: pointer; background: none; border: none; color: var(--text); text-transform: uppercase; }
.nav-overlay .nav-back:hover { opacity: 1; }
.nav-overlay .nav-close {
  position: absolute; top: 28px; right: 48px;
  width: 28px; height: 28px; background: none; border: none; cursor: pointer; z-index: 10001;
}
.nav-overlay .nav-close::before,
.nav-overlay .nav-close::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 22px; height: 2px; background: var(--text);
}
.nav-overlay .nav-close::before { transform: translate(-50%, -50%) rotate(45deg); }
.nav-overlay .nav-close::after { transform: translate(-50%, -50%) rotate(-45deg); }
.nav-overlay .nav-close:hover { opacity: 0.6; }

/* RESPONSIVE */
@media (max-width: 1100px) {
  .artists-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 900px) {
  nav { padding: 20px 24px; }
  .page-header { padding: 140px 24px 60px; }
  .page-header-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
  #artists-list-view { padding: 0 0 80px; }
  .artists-toolbar { padding: 32px 24px 0; }
  .artists-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 24px; }
  .artist-back { padding: 40px 24px 0; }
  .artist-detail { padding: 32px 24px 80px; }
  .artist-detail-header { grid-template-columns: 1fr; gap: 32px; }
  .artist-event-row { grid-template-columns: 60px 1fr; gap: 16px; }
  .artist-event-tag { grid-column: 2; }
  .footer-top { flex-direction: column; gap: 24px; text-align: center; }
}
@media (max-width: 768px) {
  .nav-hamburger { display: flex; top: 20px; right: 24px; }
  .nav-overlay .nav-close { top: 20px; right: 24px; }
  nav .nav-links { display: none; }
  .footer-links { gap: 20px; }
  .artists-grid { grid-template-columns: repeat(2, 1fr); }
  .artists-search-row { flex-wrap: wrap; }
  .artists-search { max-width: 100%; }
  .artists-count { margin-left: 0; width: 100%; }
  .artists-genre-nav { gap: 0; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .artists-genre-nav::-webkit-scrollbar { display: none; }
  .genre-tab { padding: 10px 14px; font-size: 8px; }
}
@media (max-width: 480px) {
  .artists-grid { grid-template-columns: repeat(2, 1fr); gap: 3px; padding: 16px; }
  .artists-toolbar { padding: 24px 16px 0; gap: 16px; }
  .artist-card-content { padding: 12px; }
  .artist-card-name { font-size: 16px; }
  .artist-card-genre { font-size: 7px; margin-bottom: 3px; }
  .artist-card-city { font-size: 7px; }
}
@media (hover: none) and (pointer: coarse) {
  body { cursor: auto; }
  .cursor-dot, .cursor-ring { display: none; }
  .artist-card { cursor: pointer; }
  .artist-back { cursor: pointer; }
  .artists-sort, .genre-tab { cursor: pointer; }
  .nav-hamburger, .nav-overlay .nav-close, .nav-overlay .nav-back, .nav-overlay a { cursor: pointer; }
}
</style>
</head>

<script src="data.js?v=3"></script>
<script>
const WEEKDAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function isUpcoming(s) { const t = new Date(); t.setHours(0,0,0,0); return parseDate(s) >= t; }
function getArtist(id) { return ARTISTS.find(a => a.id === id); }
function getArtistEvents(id) {
  return EVENTS.filter(e => e.lineup && e.lineup.includes(id))
    .sort((a,b) => parseDate(a.date) - parseDate(b.date));
}

/* ========== SCROLL OBSERVER ========== */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.1 });

function observeAll() { document.querySelectorAll('.reveal').forEach(el => observer.observe(el)); }

/* ========== GENRES & STATE ========== */
let currentGenre = 'ALL';
let currentSearch = '';
let currentSort = 'a-z';

const gradients = [
  'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
  'linear-gradient(135deg, #2d1b2e 0%, #1a1a2e 50%, #0f1123 100%)',
  'linear-gradient(135deg, #1b2d1e 0%, #0f1a14 50%, #0a1210 100%)',
  'linear-gradient(135deg, #2e1b1b 0%, #1a0f0f 50%, #120a0a 100%)',
  'linear-gradient(135deg, #1b1b2e 0%, #0f0f1a 50%, #0a0a12 100%)',
  'linear-gradient(135deg, #2e2e1b 0%, #1a1a0f 50%, #12120a 100%)',
];

function getGenreString(a) {
  if (!a.genre) return '';
  return Array.isArray(a.genre) ? a.genre.join(' / ') : a.genre;
}

function getGenreArray(a) {
  if (!a.genre) return [];
  return Array.isArray(a.genre) ? a.genre : a.genre.split(/\s*\/\s*/);
}

function buildGenreNav() {
  const allGenres = new Set();
  ARTISTS.forEach(a => getGenreArray(a).forEach(g => allGenres.add(g.trim().toUpperCase())));
  const sorted = ['ALL', ...['TECHNO','HOUSE','MINIMAL','EXPERIMENTAL','AMBIENT','ELECTRONIC','LIVE'].filter(g => allGenres.has(g))];
  // Add remaining genres
  allGenres.forEach(g => { if (!sorted.includes(g)) sorted.push(g); });

  const nav = document.getElementById('genre-nav');
  nav.innerHTML = sorted.map(g =>
    `<button class="genre-tab${g === 'ALL' ? ' active' : ''}" data-genre="${g}">${g}</button>`
  ).join('');

  nav.addEventListener('click', e => {
    const btn = e.target.closest('.genre-tab');
    if (!btn) return;
    currentGenre = btn.dataset.genre;
    nav.querySelectorAll('.genre-tab').forEach(b => b.classList.toggle('active', b === btn));
    renderArtistsList();
  });
}

function getFilteredArtists() {
  let list = [...ARTISTS];

  // Filter by genre
  if (currentGenre !== 'ALL') {
    list = list.filter(a => getGenreArray(a).some(g => g.trim().toUpperCase() === currentGenre));
  }

  // Filter by search
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(a =>
      a.name.toLowerCase().includes(q) ||
      (a.city && a.city.toLowerCase().includes(q)) ||
      (a.country && a.country.toLowerCase().includes(q)) ||
      getGenreString(a).toLowerCase().includes(q)
    );
  }

  // Sort
  if (currentSort === 'a-z') {
    list.sort((a, b) => a.name.localeCompare(b.name));
  } else {
    list.sort((a, b) => b.name.localeCompare(a.name));
  }

  return list;
}

/* ========== RENDER LIST ========== */
function renderArtistsList() {
  const grid = document.getElementById('artists-grid');
  const filtered = getFilteredArtists();

  document.getElementById('artists-count').textContent = filtered.length + ' ARTISTS';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="artists-empty">No artists found</div>';
    return;
  }

  grid.innerHTML = filtered.map((a, i) => {
    const bg = a.image
      ? `background-image:url('${a.image}')`
      : `background:${gradients[i % gradients.length]}`;
    const genreLabel = getGenreString(a);
    return `
    <a href="#artist/${a.id}" class="artist-card reveal" data-id="${a.id}">
      <div class="artist-card-img" style="${bg}"></div>
      <div class="artist-card-content">
        <div class="artist-card-genre">${genreLabel}</div>
        <div class="artist-card-name">${a.name}</div>
        <div class="artist-card-city">${a.country || a.city || ''}</div>
      </div>
    </a>`;
  }).join('');
  observeAll();
  bindCursorExpand();
}

/* ========== RENDER DETAIL ========== */
function renderArtistDetail(id) {
  const a = getArtist(id);
  if (!a) return;
  const events = getArtistEvents(id);

  const linksHtml = a.links ? Object.entries(a.links).map(([k, v]) =>
    `<a href="${v}" target="_blank" rel="noopener">${k.toUpperCase()}</a>`
  ).join('') : '';

  const eventsHtml = events.length ? events.map(ev => {
    const d = parseDate(ev.date);
    const upcoming = isUpcoming(ev.date);
    const venue = typeof VENUES !== 'undefined' ? VENUES.find(v => v.name === ev.venue) : null;
    const venueLink = venue ? `<a href="venues.html#venue/${venue.id}" style="opacity:0.4;transition:opacity 0.3s;border-bottom:1px solid rgba(240,237,232,0.12);padding-bottom:1px">${ev.venue}</a>` : ev.venue;
    return `
      <div class="artist-event-row">
        <div class="artist-event-date">${MONTHS_SHORT[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}</div>
        <div class="artist-event-info">
          <div class="artist-event-name">${ev.name}</div>
          <div class="artist-event-venue">${venueLink} — ${ev.city}</div>
        </div>
        <span class="artist-event-tag ${upcoming ? '' : 'past'}">${upcoming ? 'UPCOMING' : 'PAST'}</span>
      </div>`;
  }).join('') : '<div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;opacity:0.3;padding:32px 0;">NO EVENTS SCHEDULED</div>';

  // Unique venues this artist plays at
  const artistVenues = [...new Set(events.map(e => e.venue))];
  const venuesHtml = artistVenues.length ? artistVenues.map(vName => {
    const v = typeof VENUES !== 'undefined' ? VENUES.find(x => x.name === vName) : null;
    if (!v) return `<span style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;padding:6px 16px;border:1px solid rgba(240,237,232,0.1);opacity:0.4">${vName}</span>`;
    return `<a href="venues.html#venue/${v.id}" style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;padding:6px 16px;border:1px solid rgba(240,237,232,0.1);opacity:0.4;transition:opacity 0.3s ease;display:inline-block">${v.name} — ${v.city}</a>`;
  }).join('') : '';

  document.getElementById('artist-detail').innerHTML = `
    <div class="artist-detail-header reveal">
      <div class="artist-detail-name">${a.name}</div>
      <div class="artist-detail-meta">
        <div class="artist-detail-tags">
          <span>${a.country}</span>
          <span>${a.genre}</span>
        </div>
        <div class="artist-detail-bio">${a.bio}</div>
        ${linksHtml ? `<div class="artist-detail-links">${linksHtml}</div>` : ''}
      </div>
    </div>
    ${venuesHtml ? `<div class="artist-events reveal">
      <div class="artist-events-title">VENUES</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding:8px 0">${venuesHtml}</div>
    </div>` : ''}
    <div class="artist-events reveal">
      <div class="artist-events-title">EVENTS</div>
      ${eventsHtml}
    </div>`;

  observeAll();
  bindCursorExpand();
}

/* ========== SEARCH & SORT BINDINGS ========== */
function initSearchSort() {
  const searchInput = document.getElementById('artists-search');
  const sortSelect = document.getElementById('artists-sort');

  let debounceTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      currentSearch = searchInput.value.trim();
      renderArtistsList();
    }, 200);
  });

  sortSelect.addEventListener('change', () => {
    currentSort = sortSelect.value;
    renderArtistsList();
  });
}

/* ========== VIEW SWITCHING ========== */
function showList() {
  document.getElementById('artists-list-view').style.display = 'block';
  document.getElementById('artist-detail-view').style.display = 'none';
  document.getElementById('page-header').style.display = 'block';
  window.scrollTo(0, 0);
}

function showDetail(id) {
  document.getElementById('artists-list-view').style.display = 'none';
  document.getElementById('artist-detail-view').style.display = 'block';
  document.getElementById('page-header').style.display = 'none';
  renderArtistDetail(id);
  window.scrollTo(0, 0);
}

/* ========== ROUTING (hash-based) ========== */
function handleRoute() {
  const hash = window.location.hash;
  if (hash.startsWith('#artist/')) {
    const id = hash.replace('#artist/', '');
    showDetail(id);
  } else {
    showList();
  }
}

window.addEventListener('hashchange', handleRoute);

document.getElementById('artist-back-btn').addEventListener('click', (e) => {
  e.preventDefault();
  window.location.hash = '';
  showList();
});

/* ========== CURSOR ========== */
const dot = document.querySelector('.cursor-dot');
const ring = document.querySelector('.cursor-ring');
let mouseX = 0, mouseY = 0, ringX = 0, ringY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
});

function animateRing() {
  ringX += (mouseX - ringX) * 0.15; ringY += (mouseY - ringY) * 0.15;
  ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

function bindCursorExpand() {
  document.querySelectorAll('a, .artist-card, .artist-back').forEach(el => {
    el.addEventListener('mouseenter', () => { ring.style.width = '52px'; ring.style.height = '52px'; });
    el.addEventListener('mouseleave', () => { ring.style.width = '36px'; ring.style.height = '36px'; });
  });
}

/* ========== INIT ========== */
buildGenreNav();
initSearchSort();
renderArtistsList();
handleRoute();
</script>
</body>
</html>
